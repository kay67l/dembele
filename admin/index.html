<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ARSRC</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #060c1f;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(29,78,216,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,78,216,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridPan 20s linear infinite;
    }

    @keyframes gridPan {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* Radial glow behind the card */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,78,216,0.18), transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .cursor-glow {
      position: fixed; width: 400px; height: 400px;
      border-radius: 50%; pointer-events: none; z-index: 1;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%);
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease-out;
    }

    .card {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: rgba(10,19,48,0.75);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
      transition: transform 0.15s ease-out;
      will-change: transform;
      margin: 20px;
    }

    /* Brand badge */
    .brand {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; margin-bottom: 36px;
    }

    .brand-badge {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #1d4ed8, #102a6b);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: white;
      box-shadow: 0 8px 24px rgba(29,78,216,0.4);
      letter-spacing: -0.5px;
    }

    .brand h1 {
      font-size: 17px; font-weight: 800; color: #eef2ff;
      text-align: center; line-height: 1.3;
    }

    .brand p {
      font-size: 12px; color: rgba(238,242,255,0.5);
      text-align: center; letter-spacing: 1px; text-transform: uppercase;
    }

    /* Divider */
    .divider {
      height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 32px;
    }

    /* Form */
    .form-group { margin-bottom: 20px; }

    label {
      display: block; font-size: 12px; font-weight: 700;
      color: #3b82f6; margin-bottom: 8px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    input[type="password"] {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: #eef2ff;
      font-size: 15px; font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 2px;
    }

    input[type="password"]::placeholder {
      color: rgba(238,242,255,0.25);
      letter-spacing: normal;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1d4ed8, #102a6b);
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      font-family: inherit; margin-top: 8px;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 8px 24px rgba(29,78,216,0.35);
      position: relative; overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0; transition: opacity 0.2s ease;
    }

    .login-btn:hover:not(:disabled)::before { opacity: 1; }
    .login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(29,78,216,0.45); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Error / status message */
    .msg {
      display: none; margin-top: 16px; padding: 12px 14px;
      border-radius: 10px; font-size: 13px; font-weight: 700;
      text-align: center; animation: fadeInDown 0.3s ease;
    }

    .msg.error {
      display: block;
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.3);
      color: #fca5a5;
    }

    .msg.info {
      display: block;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.3);
      color: #93c5fd;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Footer note */
    .footer-note {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: rgba(238,242,255,0.3);
    }

    .footer-note a {
      color: rgba(59,130,246,0.6);
      text-decoration: none;
    }

    .footer-note a:hover { color: #3b82f6; }
  </style>
</head>
<body>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="card" id="loginCard">
  <div class="brand">
    <div class="brand-badge"><img viewBox="0 0 200 200" width="100%" height="100%" src="ar.png"></div>
    <h1>ARSRC Admin</h1>
    <p>Ashanti Regional Students' Representative Council</p>
  </div>

  <div class="divider"></div>

  <div class="form-group">
    <label for="password">Admin Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter your password"
      autocomplete="current-password"
      autofocus
    >
  </div>

  <button class="login-btn" id="loginBtn">Sign In</button>

  <div class="msg" id="msg"></div>

  <p class="footer-note">
    <a href="/">← Back to ARSRC website</a>
  </p>
</div>

<script>
  // Cursor glow
  const glow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    glow.style.transform = `translate3d(${e.clientX - 200}px, ${e.clientY - 200}px, 0)`;
  });

  // Card 3D tilt
  const card = document.getElementById('loginCard');
  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rotateY =  ((x - rect.width  / 2) / (rect.width  / 2)) * 8;
    const rotateX = -((y - rect.height / 2) / (rect.height / 2)) * 8;
    card.style.transform = `perspective(900px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg)`;
  });
  card.addEventListener('mouseleave', () => { card.style.transform = ''; });

  // Login handler
  const btn  = document.getElementById('loginBtn');
  const pwd  = document.getElementById('password');
  const msg  = document.getElementById('msg');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className   = 'msg ' + type;
  }

  async function login() {
    const password = pwd.value;
    if (!password) { showMsg('Please enter your password.', 'error'); return; }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';
    msg.className   = 'msg';

    try {
      const res  = await fetch('/api/admin/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ password }),
        credentials: 'same-origin',
      });

      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || 'Login failed.', 'error');
        pwd.value = '';
        pwd.focus();
        return;
      }

      showMsg('Authenticated. Redirecting…', 'info');
      setTimeout(() => { window.location.href = '/admin/dashboard.html'; }, 600);

    } catch (err) {
      showMsg('Network error. Check your connection.', 'error');
      console.error('[ARSRC Admin] Login error:', err);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  btn.addEventListener('click', login);
  pwd.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

  // Redirect if already logged in
  fetch('/api/admin/verify', { credentials: 'same-origin' })
    .then(r => { if (r.ok) window.location.href = '/admin/dashboard.html'; })
    .catch(() => {});
</script>
</body>
</html>
