<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources Manager</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/dashboard.css">

<style>

.resource-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.resource{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:20px 0;
    gap:20px;
}

.resource h3{
    width:220px;
}

.resource input[type=file]{
    flex:1;
}

.resource button{
    background:#0A3D91;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.resource button:hover{
    background:#D62828;
}

#resourceList{
    margin-top:40px;
}

.item{
    background:#f4f7fb;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>ARSRC</h2>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i> Dashboard
</li>

<li onclick="location.href='news.html'">
<i class="fa-solid fa-newspaper"></i> News
</li>

<li style="background:#D62828;">
<i class="fa-solid fa-folder"></i> Resources
</li>

<li>
<i class="fa-solid fa-image"></i> Gallery
</li>

<li>
<i class="fa-solid fa-users"></i> Executives
</li>

<li>
<i class="fa-solid fa-calendar"></i> Events
</li>

<li>
<i class="fa-solid fa-gear"></i> Settings
</li>

<li id="logout">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</li>

</ul>

</div>

<div class="main">

<h1>Resources Manager</h1>

<br>

<div class="resource-box">

<div class="resource">

<h3>Constitution</h3>

<input type="file" id="constitution">

<button onclick="uploadResource('constitution')">

Upload

</button>

</div>

<div class="resource">

<h3>Prefects' Manual</h3>

<input type="file" id="prefects">

<button onclick="uploadResource('prefects')">

Upload

</button>

</div>

<div class="resource">

<h3>Student Handbook</h3>

<input type="file" id="handbook">

<button onclick="uploadResource('handbook')">

Upload

</button>

</div>

<div id="resourceList">

<h2>Uploaded Resources</h2>

</div>

</div>

</div>

<script src="js/resources.js"></script>

<script src="js/dashboard.js"></script>

</body>
</html>
