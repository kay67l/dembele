<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery Manager</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/dashboard.css">

<style>

.gallery-box{
    background:#fff;
    padding:25px;
    border-radius:15px;
}

#preview{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    margin-top:30px;
}

.photo{
    background:#eee;
    border-radius:10px;
    overflow:hidden;
}

.photo img{
    width:100%;
    height:180px;
    object-fit:cover;
}

button{
    padding:12px 20px;
    background:#0A3D91;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#D62828;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>ARSRC</h2>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i> Dashboard
</li>

<li onclick="location.href='news.html'">
<i class="fa-solid fa-newspaper"></i> News
</li>

<li onclick="location.href='resources.html'">
<i class="fa-solid fa-folder"></i> Resources
</li>

<li style="background:#D62828;">
<i class="fa-solid fa-image"></i> Gallery
</li>

<li><i class="fa-solid fa-users"></i> Executives</li>

<li><i class="fa-solid fa-calendar"></i> Events</li>

<li><i class="fa-solid fa-gear"></i> Settings</li>

<li id="logout">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</li>

</ul>

</div>

<div class="main">

<h1>Gallery Manager</h1>

<div class="gallery-box">

<input type="file" id="galleryImage" accept="image/*">

<button onclick="addImage()">
Upload Image
</button>

<div id="preview"></div>

</div>

</div>

<script src="js/gallery.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
