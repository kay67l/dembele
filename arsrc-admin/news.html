<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Manager | ARSRC</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/dashboard.css">

    <style>

        .editor{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        input, select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        textarea{
            width:100%;
            height:350px;
            padding:15px;
            margin:15px 0;
            border-radius:8px;
            border:1px solid #ccc;
            resize:vertical;
            font-size:16px;
        }

        .buttons{
            display:flex;
            gap:15px;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            color:white;
            font-size:15px;
        }

        .draft{
            background:#555;
        }

        .publish{
            background:#0A3D91;
        }

        .publish:hover{
            background:#D62828;
        }

    </style>

</head>
<body>

<div class="sidebar">

<h2>ARSRC</h2>

<ul>

<li onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i> Dashboard</li>

<li style="background:#D62828;"><i class="fa-solid fa-newspaper"></i> News</li>

<li><i class="fa-solid fa-folder"></i> Resources</li>

<li><i class="fa-solid fa-image"></i> Gallery</li>

<li><i class="fa-solid fa-users"></i> Executives</li>

<li><i class="fa-solid fa-calendar"></i> Events</li>

<li><i class="fa-solid fa-gear"></i> Settings</li>

<li id="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</li>

</ul>

</div>

<div class="main">

<h1>News Manager</h1>

<br>

<div class="editor">

<input
id="title"
type="text"
placeholder="Article Title">

<select id="category">

<option>AshantiFest</option>

<option>Education</option>

<option>Sports</option>

<option>Announcements</option>

<option>General</option>

</select>

<input
type="file"
id="image">

<textarea
id="content"
placeholder="Write your news article here..."></textarea>

<div class="buttons">

<button class="draft">
Save Draft
</button>

<button
class="publish"
id="publishBtn">
Publish
</button>

</div>

</div>

</div>

<script src="js/news.js"></script>

<script src="js/dashboard.js"></script>

</body>
</html>
